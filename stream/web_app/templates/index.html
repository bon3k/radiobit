<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>radiobit</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- TOP BAR -->
    <div class="d-flex justify-content-end align-items-center mb-3 p-2">

        <!-- SYSTEM MENU -->
        <div class="dropdown mr-2">
            <button class="btn btn-dark btn-sm dropdown-toggle" type="button" id="systemMenu" data-toggle="dropdown">
                <i class="fas fa-bars"></i>
            </button>

            <div class="dropdown-menu dropdown-menu-right">

                <button class="dropdown-item" id="updateBtn">
                    <i class="fas fa-sync mr-2"></i> System Update
                </button>

                <button class="dropdown-item" id="rebootBtn">
                    <i class="fas fa-redo mr-2"></i> Reboot
                </button>

                <button class="dropdown-item" id="shutdownBtn">
                    <i class="fas fa-power-off mr-2"></i> Shutdown
                </button>

            </div>
        </div>

        <!-- LOGOUT -->
        <a href="{{ url_for('logout') }}" class="btn btn-secondary btn-sm">
            <i class="fas fa-sign-out-alt mr-1"></i> log out
        </a>

    </div>

    <div class="container mt-5">

        <h1>[ •_• ] </h1>

        <a href="{{ url_for('add_connection') }}" class="btn btn-primary mr-3">
            <i class="fas fa-plus"></i> New Connection
        </a>

        <a href="{{ url_for('file_manager') }}" class="btn btn-info mr-3">
            <i class="fas fa-folder"></i> File Manager
        </a>

        <a href="{{ url_for('edit_streams') }}" class="btn btn-purple">
            <i class="fas fa-pen"></i> Edit Stream
        </a>

        <!-- YT DOWNLOAD -->
        <div class="card mt-4 p-3">

            <h5>
                <i class="fas fa-download mr-2"></i>
                Download from URL
                <span id="downloadStatus" style="margin-left:10px; font-size:0.85em;"></span>
            </h5>

            <div class="input-group">
                <input type="text"
                       id="yt_url"
                       class="form-control"
                       placeholder="https://...">

                <div class="input-group-append">
                    <button class="btn btn-primary" onclick="downloadYT()">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            </div>

        </div>

        <!-- VOLUME -->
        <div class="form-group mt-4">
            <label for="volumeRange">Default System Volume</label>
            <input type="range"
                   class="form-control-range"
                   id="volumeRange"
                   min="0" max="1" step="0.01"
                   value="{{ default_volume }}">
            <span id="volumeValue">{{ default_volume }}</span>
        </div>

        <!-- CONNECTION TABLE -->
        <table class="table">
            <thead>
                <tr>
                    <th>Conexion</th>
                    <th>Type</th>
                    <th>Estado</th>
                    <th>Accions</th>
                </tr>
            </thead>
            <tbody>
                {% for conn in connections %}
                <tr>
                    <td>{{ conn.name }}</td>
                    <td>{{ conn.type }}</td>
                    <td>{{ conn.state }}</td>
                    <td>

                        {% if conn.state != "activated" %}
                        <form method="POST"
                              action="{{ url_for('connect_connection', name=conn.name) }}"
                              style="display:inline;">
                            <button type="submit" class="btn btn-primary btn-sm">
                                <i class="fas fa-play"></i>
                            </button>
                        </form>
                        {% else %}
                        <button class="btn btn-success btn-sm" disabled>
                            <i class="fas fa-check"></i>
                        </button>
                        {% endif %}

                        <form method="POST"
                              action="{{ url_for('delete_connection', name=conn.name) }}"
                              style="display:inline;">
                            <button type="submit" class="btn btn-secondary btn-sm">
                                <i class="fas fa-times"></i>
                            </button>
                        </form>

                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>

    <!-- JS -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // --- VOLUME ---
        const slider = document.getElementById('volumeRange');
        const volumeValue = document.getElementById('volumeValue');

        slider.addEventListener('input', () => {
            volumeValue.textContent = slider.value;
        });

        slider.addEventListener('change', () => {
            fetch('/set_volume', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `volume=${slider.value}`
            })
            .then(res => res.json())
            .then(data => {
                if (!data.success) alert("Error: " + data.error);
            });
        });

        // --- YT DOWNLOAD ---
        function downloadYT() {
            const url = document.getElementById("yt_url").value;

            if (!url) return;

            fetch('/download_yt', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById("yt_url").value = "";
                }
            });
        }

        // --- DOWNLOAD STATUS POLLING ---
        setInterval(() => {
            fetch('/download_status')
            .then(r => r.json())
            .then(data => {
                const el = document.getElementById("downloadStatus");

                if (data.running) {
                    el.innerHTML = "⏳ Downloading...";
                    el.style.color = "#ffc107";
                } else if (data.message) {
                    el.innerHTML = data.message;
                    el.style.color = "#28a745";
                } else {
                    el.innerHTML = "";
                }
            });
        }, 1000);

        // --- SYSTEM UPDATE ---
        document.getElementById("updateBtn").addEventListener("click", () => {
            if (!confirm("Run system update?")) return;

            fetch('/system_update', { method: 'POST' });
        });

        // --- REBOOT ---
        document.getElementById("rebootBtn").addEventListener("click", () => {
            if (!confirm("Reboot system?")) return;
            fetch('/reboot', { method: 'POST' });
        });

        // --- SHUTDOWN ---
        document.getElementById("shutdownBtn").addEventListener("click", () => {
            if (!confirm("Shutdown system?")) return;
            fetch('/shutdown', { method: 'POST' });
        });

    </script>

</body>
</html>
